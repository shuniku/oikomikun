<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>追い込みくん | HIITタイマー</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="phase-idle">
  <main class="app">

    <!-- 設定画面 -->
    <section id="setup-screen" class="screen">
      <h1 class="app-title">追い込みくん</h1>

      <div class="preset-row" id="preset-row" role="group" aria-label="プリセット"></div>

      <form id="setup-form" class="setup-form" novalidate>
        <div class="field">
          <label for="input-prepare">準備（秒）</label>
          <input type="number" id="input-prepare" inputmode="numeric" min="0" max="300" step="1">
        </div>
        <div class="field">
          <label for="input-work">運動（秒）</label>
          <input type="number" id="input-work" inputmode="numeric" min="1" max="3600" step="1">
        </div>
        <div class="field">
          <label for="input-rest">休憩（秒）</label>
          <input type="number" id="input-rest" inputmode="numeric" min="0" max="3600" step="1">
        </div>
        <div class="field">
          <label for="input-sets">セット数</label>
          <input type="number" id="input-sets" inputmode="numeric" min="1" max="99" step="1">
        </div>
      </form>

      <p class="total-preview">合計 <span id="total-preview">--:--</span></p>

      <label class="sound-toggle">
        <input type="checkbox" id="input-sound" checked>
        サウンド ON
      </label>

      <div id="error-box" class="error-box" role="alert" hidden></div>

      <button type="button" id="btn-start" class="btn btn-primary">スタート</button>
    </section>

    <!-- タイマー画面 -->
    <section id="timer-screen" class="screen" hidden>
      <p id="phase-label" class="phase-label">準備</p>
      <p id="time-display" class="time-display">00:10</p>
      <p id="set-counter" class="set-counter">セット 0 / 8</p>

      <div class="progress-track" aria-hidden="true">
        <div id="progress-fill" class="progress-fill"></div>
      </div>

      <div class="control-row">
        <button type="button" id="btn-pause" class="btn btn-primary">一時停止</button>
        <button type="button" id="btn-reset" class="btn btn-ghost">リセット</button>
      </div>
    </section>

  </main>

  <script src="js/timer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
