<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="筋トレ用HIITタイマー「追い込みくん」。準備・運動・休憩を自動で回す、オフラインでも動くWebアプリ。">
  <!-- OGP: SNS共有時のプレビュー用メタデータ。クローラーだけが参照するため
       絶対URLだがオフライン動作（N-01）には影響しない -->
  <meta property="og:title" content="追い込みくん | HIITタイマー">
  <meta property="og:description" content="筋トレ用HIITタイマー。準備・運動・休憩を自動で回す、インストール不要のWebアプリ。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://shuniku.github.io/oikomikun/">
  <meta property="og:image" content="https://shuniku.github.io/oikomikun/image/icon-512.png">
  <meta name="twitter:card" content="summary">
  <title>追い込みくん | HIITタイマー</title>
  <link rel="icon" type="image/svg+xml" href="image/favicon.svg">
  <link rel="apple-touch-icon" href="image/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="phase-idle">
  <main class="app">

    <!-- 設定画面 -->
    <section id="setup-screen" class="screen">
      <div class="lang-row" id="lang-row" role="group" aria-label="Language"></div>

      <h1 class="app-title">追い込みくん</h1>

      <div class="preset-row" id="preset-row" role="group" aria-label="プリセット"></div>

      <form id="setup-form" class="setup-form" novalidate>
        <div class="field">
          <label for="input-prepare" data-i18n="fieldLabels.prepareSec">準備（秒）</label>
          <input type="number" id="input-prepare" inputmode="numeric" min="0" max="300" step="1">
        </div>
        <div class="field">
          <label for="input-work" data-i18n="fieldLabels.workSec">運動（秒）</label>
          <input type="number" id="input-work" inputmode="numeric" min="1" max="3600" step="1">
        </div>
        <div class="field">
          <label for="input-rest" data-i18n="fieldLabels.restSec">休憩（秒）</label>
          <input type="number" id="input-rest" inputmode="numeric" min="0" max="3600" step="1">
        </div>
        <div class="field">
          <label for="input-sets" data-i18n="fieldLabels.sets">セット数</label>
          <input type="number" id="input-sets" inputmode="numeric" min="1" max="99" step="1">
        </div>
      </form>

      <p class="total-preview"><span data-i18n="totalLabel">合計</span> <span id="total-preview">--:--</span></p>

      <label class="sound-toggle">
        <input type="checkbox" id="input-sound" checked>
        <span data-i18n="soundLabel">サウンド ON</span>
      </label>

      <div id="error-box" class="error-box" role="alert" hidden></div>

      <button type="button" id="btn-start" class="btn btn-primary" data-i18n="start">スタート</button>
    </section>

    <!-- タイマー画面 -->
    <section id="timer-screen" class="screen" hidden>
      <p id="phase-label" class="phase-label" aria-live="polite">準備</p>
      <p id="time-display" class="time-display">00:10</p>
      <p id="set-counter" class="set-counter">セット 0 / 8</p>

      <div class="progress-track" aria-hidden="true">
        <div id="progress-fill" class="progress-fill"></div>
      </div>

      <div class="control-row">
        <button type="button" id="btn-pause" class="btn btn-primary" data-i18n="pause">一時停止</button>
        <button type="button" id="btn-reset" class="btn btn-ghost" data-i18n="reset">リセット</button>
      </div>
    </section>

  </main>

  <script src="js/timer.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
